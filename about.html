<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Civilian Operations</title>

<style>
:root {
  --bg: #f4f6f8;
  --text: #111827;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  background: #111827;
  color: white;
  padding: 14px 24px;
}

/* MAIN LAYOUT */
.page {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  gap: 18px;
  max-width: 1400px;
  margin: 30px auto;
  padding: 0 20px;
}

/* SIDE COLUMNS (BOTH SIDES NOW MATCH) */
.side {
  display: grid;
  grid-template-rows: auto 1fr auto; /* top / spacer / bottom */
  gap: 18px;
}

/* images */
.side img {
  width: 100%;
  aspect-ratio: 16 / 10;
  object-fit: cover;
  border-radius: 14px;
  cursor: pointer;
  border: 1px solid #e5e7eb;
  transition: 0.2s;
}

.side img:hover {
  transform: scale(1.03);
}

/* spacer row */
.spacer {
  display: block;
}

/* CENTER */
.content {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.hero, .card {
  background: white;
  border-radius: 14px;
  padding: 18px;
  border: 1px solid #e5e7eb;
}

/* FOOTER */
footer {
  background: #0f172a;
  color: #94a3b8;
  padding: 40px 20px;
  margin-top: 40px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
}

/* MOBILE */
@media (max-width: 900px) {
  .page {
    grid-template-columns: 1fr;
  }

  .side {
    grid-template-rows: auto auto;
  }

  .spacer {
    display: none;
  }
}
</style>
</head>

<body>

<header>
  <h2 style="margin:0; padding:14px 24px;">Civilian Operations</h2>
</header>

<div class="page">

  <!-- LEFT (FIXED) -->
  <div class="side">
    <img src="image1.png" onclick="openModal(this.src)">
    <div class="spacer"></div>
    <img src="image2.png" onclick="openModal(this.src)">
  </div>

  <!-- CENTER -->
  <div class="content">

    <div class="hero">
      <h2>🏙 Civilian Operations</h2>
      <p>We manage civilian roleplay across KSRP.</p>
    </div>

    <div class="card">
      <h3>What is Civ Ops?</h3>
      <p>Oversees civilian RP and economy systems.</p>
    </div>

    <div class="card">
      <h3>Responsibilities</h3>
      <ul>
        <li>Roleplay scenarios</li>
        <li>Businesses</li>
        <li>Economy balance</li>
      </ul>
    </div>

    <div class="card" id="get-involved">
      <h3>Get Involved</h3>
      <p>Join Civ Ops events and RP activities.</p>
    </div>

  </div>

  <!-- RIGHT (FIXED) -->
  <div class="side">
    <img src="MedalTVRoblox20260307200704891_-_Copy.png" onclick="openModal(this.src)">
    <div class="spacer"></div>
    <img src="MedalTVRoblox20260307200735969_-_Copy.png" onclick="openModal(this.src)">
  </div>

</div>

<footer>
  <div style="text-align:center;">Civ Ops Footer</div>
</footer>

<!-- MODAL -->
<div class="modal" id="modal" onclick="this.style.display='none'">
  <img id="modalImg">
</div>

<script>
function openModal(src){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=src;
}
</script>

</body>
</html>
